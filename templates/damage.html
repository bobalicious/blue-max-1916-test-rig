<div class="card card-damage card-damage-{{effectClass}}">
  <div class="card-header">
    <span class="card-type">Damage</span>
    <span class="card-effect-badge">{{effectIcon}}</span>
  </div>
  <div class="card-title">{{name}}</div>
  <div class="card-body">
    <div class="card-damage-icon">{{effectIcon}}</div>
  </div>
  <div class="card-text">
    <div class="card-notes">{{description}}</div>
  </div>
</div>
